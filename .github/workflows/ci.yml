name: Simulated-endpoint validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit and integration tests
        run: python -m unittest discover -s tests -v

      - name: Regenerate deterministic benchmark artifacts
        run: python scripts/generate_smd_bench.py

      - name: Verify checked-in benchmark artifacts are reproducible
        run: >-
          git diff --exit-code --
          data/smd_bench_112_development_pilot.jsonl
          data/smd_bench_1400.jsonl
          data/smd_bench_1400_manifest.json
          data/smd_challenge_210.jsonl
          data/smd_challenge_210_manifest.json
          data/smd_egress_challenge_36.jsonl
          data/smd_egress_challenge_36_manifest.json
          data/review

      - name: Verify post-freeze controller integrity
        run: python scripts/check_controller_freeze.py

      - name: Evaluate the 112-case development pilot without external APIs
        run: >-
          python scripts/run_eval.py
          --dataset data/smd_bench_112_development_pilot.jsonl
          --run-dir runs/ci-pilot
          --output runs/ci-pilot/report.json
          --benchmark-name SMD-Bench-112-development-pilot
          --summary-only

      - name: Evaluate SMD-Bench-1400
        run: >-
          python scripts/run_eval.py
          --dataset data/smd_bench_1400.jsonl
          --run-dir runs/ci-main
          --output runs/ci-main/report.json
          --benchmark-name SMD-Bench-1400
          --summary-only

      - name: Evaluate main utility-weight sensitivity
        run: >-
          python scripts/run_utility_sensitivity.py
          --report runs/ci-main/report.json
          --output runs/ci-main/utility-sensitivity.json

      - name: Smoke test local web UI and simulated endpoint
        run: python scripts/smoke_web.py

      - name: Evaluate the post-freeze challenge set
        run: >-
          python scripts/run_eval.py
          --dataset data/smd_challenge_210.jsonl
          --run-dir runs/ci-challenge
          --output runs/ci-challenge/report.json
          --benchmark-name SMD-Challenge-210
          --summary-only

      - name: Evaluate challenge utility-weight sensitivity
        run: >-
          python scripts/run_utility_sensitivity.py
          --report runs/ci-challenge/report.json
          --output runs/ci-challenge/utility-sensitivity.json

      - name: Evaluate the egress challenge set
        run: >-
          python scripts/run_eval.py
          --dataset data/smd_egress_challenge_36.jsonl
          --run-dir runs/ci-egress-challenge
          --output runs/ci-egress-challenge/report.json
          --benchmark-name SMD-Egress-Challenge-36
          --summary-only

      - name: Validate pending human-review agreement workflow
        run: python scripts/summarize_human_review.py --output docs/evidence/pr4/20-human-review-agreement.json
