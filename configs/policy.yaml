version: "0.3"
project: "Secure Model Delegation"

span_actions:
  - allow
  - remove
  - replace_with_placeholder
  - generalize
  - summarize_locally
  - deny_span

route_labels:
  - local_process
  - deny_request
  - ask_clarification
  - local_summary
  - delegate_sanitized_to_external_ai
  - delegate_pseudocode_to_external_ai

utility_labels:
  - sufficient
  - partial
  - insufficient

target_profiles:
  local_private:
    trust_level: trusted
    aliases:
      - local_model
      - private_model
      - trusted_local
    source_code_policy: allow_raw_local_processing
    notes: "Raw source code may be processed inside the trusted local/private boundary."
  approved_external_ai:
    trust_level: less_trusted
    aliases:
      - external_ai
      - openai_profile
      - claude_profile
    source_code_policy: pseudocode_or_generalized_problem_statement_only
    notes: "External assistance may receive pseudocode or a generalized problem statement, not raw private source code."
  high_risk_external_ai:
    trust_level: high_risk
    aliases:
      - untrusted_external_ai
    source_code_policy: local_summary_only
    notes: "High-risk external targets do not receive raw code or pseudocode; the gateway keeps source-code requests local."

sensitive_classes:
  api_key:
    severity: high
    default_span_action: replace_with_placeholder
    placeholder: "[API_KEY]"
    raw_external_delegation: false
    allowed_routes:
      - local_summary
      - delegate_sanitized_to_external_ai
    escalates_with:
      - source_code
      - proprietary_code
      - system_prompt
      - incident_detail
    leakage_patterns:
      - "sk-[A-Za-z0-9_-]+"
      - "(?i)api[_-]?key\\s*[=:]"
    notes: "Original API keys must never cross the boundary. Generic debugging may continue after replacement."

  auth_token:
    severity: high
    default_span_action: replace_with_placeholder
    placeholder: "[AUTH_TOKEN]"
    raw_external_delegation: false
    allowed_routes:
      - local_summary
      - delegate_sanitized_to_external_ai
    escalates_with:
      - source_code
      - incident_detail
      - prompt_injection
    leakage_patterns:
      - "(?i)authorization:\\s*bearer\\s+[A-Za-z0-9._-]+"
    notes: "Bearer tokens are replaced before any external delegation."

  config_secret:
    severity: high
    default_span_action: replace_with_placeholder
    placeholder: "[CONFIG_SECRET]"
    raw_external_delegation: false
    allowed_routes:
      - local_summary
      - delegate_sanitized_to_external_ai
    escalates_with:
      - source_code
      - incident_detail
      - prompt_injection
    leakage_patterns:
      - "(?i)(password|secret|token|key)\\s*="
    notes: "Configuration secrets are transformed, not sent raw."

  pii_name:
    severity: medium
    default_span_action: replace_with_placeholder
    placeholder: "[PERSON]"
    raw_external_delegation: false
    allowed_routes:
      - local_process
      - local_summary
      - delegate_sanitized_to_external_ai
    escalates_with:
      - incident_detail
      - prompt_injection
    leakage_patterns: []
    notes: "Person names are replaced when a contextual detector identifies them."

  pii_email:
    severity: medium
    default_span_action: replace_with_placeholder
    placeholder: "[EMAIL]"
    raw_external_delegation: false
    allowed_routes:
      - local_summary
      - delegate_sanitized_to_external_ai
    escalates_with:
      - incident_detail
      - prompt_injection
    leakage_patterns:
      - "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
    notes: "Personal email addresses are replaced with stable placeholders."

  pii_phone:
    severity: medium
    default_span_action: replace_with_placeholder
    placeholder: "[PHONE]"
    raw_external_delegation: false
    allowed_routes:
      - local_summary
      - delegate_sanitized_to_external_ai
    escalates_with:
      - incident_detail
      - prompt_injection
    leakage_patterns:
      - "\\b\\d{3}[-. ]\\d{3}[-. ]\\d{4}\\b"
    notes: "Phone numbers are replaced with stable placeholders."

  internal_hostname:
    severity: medium
    default_span_action: generalize
    placeholder: "[INTERNAL_HOST]"
    raw_external_delegation: false
    allowed_routes:
      - local_summary
      - delegate_sanitized_to_external_ai
    escalates_with:
      - incident_detail
      - source_code
      - prompt_injection
    leakage_patterns:
      - "\\b[A-Za-z0-9-]+\\.(internal|local|corp)\\b"
    notes: "Internal hostnames may be generalized for generic troubleshooting."

  private_ip:
    severity: medium
    default_span_action: generalize
    placeholder: "[PRIVATE_IP]"
    raw_external_delegation: false
    allowed_routes:
      - local_summary
      - delegate_sanitized_to_external_ai
    escalates_with:
      - incident_detail
      - source_code
      - prompt_injection
    leakage_patterns:
      - "\\b10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}\\b"
      - "\\b172\\.(1[6-9]|2\\d|3[0-1])\\.\\d{1,3}\\.\\d{1,3}\\b"
      - "\\b192\\.168\\.\\d{1,3}\\.\\d{1,3}\\b"
    notes: "Private IP addresses are generalized before delegation."

  internal_infrastructure:
    severity: medium
    default_span_action: generalize
    placeholder: "[INTERNAL_INFRA]"
    raw_external_delegation: false
    allowed_routes:
      - local_summary
      - delegate_sanitized_to_external_ai
    escalates_with:
      - incident_detail
      - source_code
      - prompt_injection
    leakage_patterns: []
    notes: "Generic infrastructure terms may remain abstract, but topology plus incident detail stays local."

  source_code:
    severity: high
    default_span_action: summarize_locally
    placeholder: "[SOURCE_CODE_LOCAL_ONLY]"
    raw_external_delegation: false
    target_policy:
      local_private: allow_raw_local_processing
      approved_external_ai: delegate_pseudocode_only
      high_risk_external_ai: local_summary_only
    allowed_routes:
      - local_process
      - local_summary
      - delegate_pseudocode_to_external_ai
    escalates_with:
      - api_key
      - auth_token
      - config_secret
      - system_prompt
      - incident_detail
      - prompt_injection
    leakage_patterns: []
    notes: "Raw source code may be processed locally. Approved external targets receive only pseudocode or a generalized problem statement. High-risk external targets receive no code-derived payload and use local summary only."

  proprietary_code:
    severity: high
    default_span_action: summarize_locally
    placeholder: "[PROPRIETARY_CODE_LOCAL_ONLY]"
    raw_external_delegation: false
    allowed_routes:
      - local_process
      - local_summary
      - delegate_pseudocode_to_external_ai
    escalates_with:
      - api_key
      - auth_token
      - config_secret
      - incident_detail
      - prompt_injection
    leakage_patterns: []
    notes: "Private implementation details are summarized or generalized before external help."

  incident_detail:
    severity: high
    default_span_action: summarize_locally
    placeholder: "[INCIDENT_DETAIL_LOCAL_ONLY]"
    raw_external_delegation: false
    allowed_routes:
      - local_process
      - local_summary
    escalates_with:
      - internal_hostname
      - private_ip
      - internal_infrastructure
      - prompt_injection
      - api_key
    leakage_patterns: []
    notes: "Detailed security incidents and topology combinations stay inside the trusted boundary."

  system_prompt:
    severity: critical
    default_span_action: deny_span
    placeholder: "[SYSTEM_PROMPT_DENIED]"
    raw_external_delegation: false
    allowed_routes:
      - deny_request
      - local_process
    escalates_with:
      - prompt_injection
      - source_code
      - api_key
    leakage_patterns:
      - "(?i)system prompt"
      - "(?i)internal agent instructions"
    notes: "System prompt extraction attempts are denied or handled locally."

  prompt_injection:
    severity: medium
    default_span_action: summarize_locally
    placeholder: "[PROMPT_INJECTION_TEXT_REMOVED]"
    raw_external_delegation: false
    allowed_routes:
      - local_process
      - local_summary
    escalates_with:
      - api_key
      - auth_token
      - source_code
      - incident_detail
      - system_prompt
    leakage_patterns:
      - "(?i)ignore.*policy"
      - "(?i)send.*secrets"
      - "(?i)reveal.*system.*prompt"
    notes: "Prompt injection is treated as untrusted data and risk amplifier, not as policy authority."

  benign_public:
    severity: low
    default_span_action: allow
    placeholder: ""
    raw_external_delegation: true
    allowed_routes:
      - local_process
      - delegate_sanitized_to_external_ai
    escalates_with: []
    leakage_patterns: []
    notes: "Public or non-sensitive requests may be delegated if useful."

conflict_resolution:
  strategy: "transformed_payload_safety_plus_remaining_utility"
  rules:
    - id: system_prompt_never_crosses_boundary
      priority: 120
      when_all_labels:
        - system_prompt
      force_route: deny_request
      effect: "deny extraction of hidden controller instructions"
    - id: explicit_local_handling_request
      priority: 115
      when_request_flags:
        - explicit_local_only
      force_route: local_process
      effect: "honor an explicit request to stay inside the trusted boundary"
    - id: local_private_target_stays_inside_boundary
      priority: 110
      target_profiles:
        - local_private
      force_route: local_process
      effect: "keep requests inside the trusted local target"
    - id: cross_turn_sensitive_history_stays_local
      priority: 105
      when_request_flags:
        - cross_turn_sensitive
      force_route: local_summary
      effect: "do not reconstruct or delegate a secret assembled across turns"
    - id: source_code_with_high_risk_context_stays_local
      priority: 100
      when_any_labels:
        - source_code
        - proprietary_code
      when_any_companion_labels:
        - api_key
        - auth_token
        - config_secret
        - incident_detail
        - system_prompt
      force_route: local_summary
      effect: "keep code combined with high-risk context local"
    - id: source_code_high_risk_external_local_summary_only
      priority: 95
      when_any_labels:
        - source_code
        - proprietary_code
      target_profiles:
        - high_risk_external_ai
      force_route: local_summary
      effect: "high-risk external targets receive no code-derived payload"
    - id: prompt_injection_is_risk_amplifier
      priority: 90
      when_all_labels:
        - prompt_injection
      when_any_companion_labels:
        - api_key
        - auth_token
        - config_secret
        - source_code
        - proprietary_code
        - incident_detail
        - system_prompt
      force_route: local_summary
      effect: "keep mixed prompt-injection and sensitive context local"
    - id: incident_detail_stays_local
      priority: 85
      when_all_labels:
        - incident_detail
      force_route: local_summary
      effect: "summarize detailed incident context inside the trusted boundary"
    - id: prompt_injection_is_data_not_authority
      priority: 80
      when_all_labels:
        - prompt_injection
      force_route: local_process
      effect: "treat an isolated injection cue as untrusted data"
    - id: source_code_target_profile_matrix
      priority: 75
      when_any_labels:
        - source_code
        - proprietary_code
      target_profiles:
        - approved_external_ai
      force_route: delegate_pseudocode_to_external_ai
      effect: "approved external targets receive a generalized problem statement"
    - id: transformed_payload_must_retain_utility
      priority: 70
      effect: "route_to_local_summary_or_clarification_if_utility_insufficient"

route_preference:
  delegate_sanitized_to_external_ai: 100
  delegate_pseudocode_to_external_ai: 95
  local_process: 90
  local_summary: 60
  ask_clarification: 30
  deny_request: 0

utility_model:
  weights:
    task_adequacy: 0.45
    information_retention: 0.25
    model_capability_fit: 0.20
    operational_cost: 0.10
  defaults:
    local_capability: 0.35
    external_capability: 0.95
  route_operational_cost:
    local_process: 0.35
    local_summary: 0.25
    ask_clarification: 0.20
    deny_request: 0.10
    delegate_sanitized_to_external_ai: 0.65
    delegate_pseudocode_to_external_ai: 0.60

leakage_oracle_defaults:
  check_exact_span_match: true
  check_case_insensitive_match: true
  check_whitespace_normalized_match: true
  check_secret_patterns: true
  check_raw_code_line_match: true
  check_prompt_injection_command_match: true
  semantic_leakage:
    automatic_check: false
    manual_review: true
    note: "Semantic leakage is documented as a limitation in PR3."
